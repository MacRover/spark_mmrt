log_level: info

mock_runners:
  - name: runner1
    can_interface: vcan0
    can_bitrate: 1000000
    filters:
    - can_id: 0x02050000
      can_mask: 0x0FFFFC00
    can_nodes:
      - name: node1
        device_id: 1
        max_velocity: 5.0
        max_acceleration: 1.0
        status_rates: [10, 1, 20, 0, 0, 20, 0, 0]
        listen_for_heartbeat: true
        flash:
          position_factor: 1.0
          velocity_factor: 1.0
          abs_position_factor: 360.0
          abs_velocity_factor: 360.0
          control_type: 0
      - name: node2
        device_id: 2
        max_velocity: 5.0
        max_acceleration: 1.0
        status_rates: [10, 1, 20, 0, 0, 20, 0, 0]
        listen_for_heartbeat: true
        flash:
          position_factor: 1.0
          velocity_factor: 1.0
          abs_position_factor: 360.0
          abs_velocity_factor: 360.0
          control_type: 0